description: >-
  The United States House of Representatives is one of the two chambers of the United
  States Congress, with the other being the Senate. Its main function is to pass federal
  legislation, which must then be approved by the Senate before it can become law.
  The House also has the power to impeach government officials, including the President,
  and to initiate revenue-related bills.
