    description: The Congress.gov API (v3) provides programmatic access to congressional data maintained by the Library of Congress.
      It offers machine-readable data covering bills, amendments, congressional records, committees, members of Congress, nominations,
      and treaties. An API key is required and can be obtained from api.data.gov. Responses are available in JSON or XML with
      a rate limit of 5,000 requests per hour and pagination up to 250 results per request.
